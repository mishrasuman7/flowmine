<svg width="100%" viewBox="0 0 680 762" role="img" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
<title>FlowMine architecture and data flow</title>
<desc>A Chrome extension captures browser events that flow through Vercel API routes into AWS DynamoDB, get analysed by a detection algorithm with Google Gemini, persist to Aurora PostgreSQL with pgvector, surface on a Next.js dashboard, and run back in the extension.</desc>
